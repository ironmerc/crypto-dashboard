server {
    listen 80;
    
    # index.html must never be cached so browsers always get the latest asset hashes
    location = /index.html {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Vite emits content-hashed filenames — safe to cache for 1 year
    location /assets/ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # Support for Single Page Applications (React/Vite)
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Telegram Bot service
    location /api/bot/ {
        proxy_pass http://telegram-bot:8888/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
